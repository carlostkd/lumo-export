<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumo Chat Export</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icon.png" alt="Icon" class="header-icon">
            <h1>Lumo Export</h1>
        </div>
        
        <div class="form-group">
            <label for="format">Export Format</label>
            <div class="select-wrapper">
                <select id="format">
                    <option value="1">JSON (Structured Data)</option>
                    <option value="2">Plain Text (Readable)</option>
                    <option value="3">HTML (Visual Layout)</option>
                </select>
                <div class="select-arrow"></div>
            </div>
        </div>

                 <div class="form-group checkbox-group" style="display: flex; justify-content: space-between; align-items: center;">
            <label class="checkbox-label">
                <input type="checkbox" id="encryptCheck">
                <span class="checkmark"></span>
                Encrypt with Password
            </label>
            <label class="checkbox-label" style="margin-left: 15px;">
                <input type="checkbox" id="tooltipCheck">
                <span class="checkmark"></span>
                Enable Tooltips
            </label>
        </div>
        <div class="password-input-wrapper hidden" id="passwordWrapper">
            <input type="password" id="passwordInput" placeholder="Enter strong password">
            <input type="password" id="confirmPasswordInput" placeholder="Confirm password">
            <div class="password-hint">Passwords must match. Min 8 chars.</div>
            <div id="matchStatus" class="match-status hidden">Passwords do not match</div>
        </div>


        <div class="form-group">
            <div class="list-header">
                <div class="search-wrapper">
                    <!-- Fixed Search Input -->
                    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search messages...">
                </div>
                <div class="list-actions">
                    <button id="selectAllBtn" class="text-btn">All</button>
                    <button id="selectUserBtn" class="text-btn">You</button>
                    <button id="selectLumoBtn" class="text-btn">Lumo</button>
                    <button id="deselectAllBtn" class="text-btn">Clear</button>
                </div>
            </div>
            
            <div id="messageList" class="message-list">
                <div class="loading-list">Scanning chat...</div>
            </div>
            
            <div id="floatingTooltip" class="floating-tooltip"></div>
            
            <div class="list-footer">
                <span id="selectedCount">0 messages selected</span>
            </div>
        </div>

        <button id="exportBtn" class="btn">
            <span class="btn-text">Export Selected</span>
            <div class="loader"></div>
        </button>

        <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
