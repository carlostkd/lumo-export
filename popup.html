<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumo Chat Export</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icon.png" alt="Icon" class="header-icon">
            <h1>Lumo Export</h1>
        </div>
        
        <div class="form-group">
            <label for="format">Export Format</label>
            <div class="select-wrapper">
                <select id="format">
                    <option value="1">JSON (Structured Data)</option>
                    <option value="2">Plain Text (Readable)</option>
                    <option value="3">HTML (Visual Layout)</option>
                </select>
                <div class="select-arrow"></div>
            </div>
        </div>

        <div class="form-group checkbox-group">
            <label class="checkbox-label">
                <input type="checkbox" id="encryptCheck">
                <span class="checkmark"></span>
                Encrypt with Password
            </label>
            <div class="password-input-wrapper hidden" id="passwordWrapper">
                <input type="password" id="passwordInput" placeholder="Enter strong password">
                <input type="password" id="confirmPasswordInput" placeholder="Confirm password">
                <div class="password-hint">Passwords must match. Min 8 chars.</div>
                <div id="matchStatus" class="match-status hidden">Passwords do not match</div>
            </div>
        </div>

        <button id="exportBtn" class="btn">
            <span class="btn-text">Export Chat</span>
            <div class="loader"></div>
        </button>

        <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
